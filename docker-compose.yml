version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: dot-traveler-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dottraveler
    ports:
      - "54321:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dottraveler"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: dot-traveler-backend
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/dottraveler?schema=public
      - JWT_SECRET=dot-traveler-super-secure-jwt-key-2026
      - PORT=3000
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: dot-traveler-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
    driver: local